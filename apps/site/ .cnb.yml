# 触发器：推送到主分支
main:
  push:
    # 从私有仓库导入环境变量：
    # 参考：https://docs.cnb.cool/en/build/env.html#importing-environment-variables
    - imports: https://cnb.cool/qianhaitech/deep_sea/others/EdgeOneKey/-/blob/main/envs.yml
      stages:
        # 构建当前项目
        - name: Build Current Project
          image: node:20
          script:
            - corepack enable
            - corepack prepare pnpm@9.15.4 --activate
            - pnpm install --frozen-lockfile
            - pnpm -r typecheck
            - pnpm --filter @global-trade/site build
        # 将构建输出部署到 EdgeOne Pages
        # ./dist 目录由前一步构建步骤生成
        # 参考：https://www.npmjs.com/package/edgeone
        - name: Deploy to EdgeOne Pages
          image: tencentcom/deploy-eopages:latest
          settings:
            project_name: edgeone-supabase-cms
            api_token: $EDGEONE_PAGES_API_TOKEN
            directory: apps/site
