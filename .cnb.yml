main:
  push:
    - imports: https://cnb.cool/qianhaitech/deep_sea/others/EdgeOneKey/-/blob/main/envs.yml
      stages:
        - name: Build
          image: node:20
          script:
            - node -v
            - corepack enable
            - corepack prepare pnpm@9.15.4 --activate
            - pnpm -v
            - pnpm install --frozen-lockfile
            - pnpm -r typecheck
            - pnpm --filter @global-trade/site build

        - name: Deploy to EdgeOne Pages
          image: node:20
          script:
            - corepack enable
            - corepack prepare pnpm@9.15.4 --activate
            - cd apps/site && PAGES_SOURCE=skills npx edgeone@latest pages deploy -n edgeone-supabase-cms -t "$EDGEONE_API_TOKEN"
